services:
  backend:
    image: ${DRT_BACKEND_IMAGE:-drt-visualization-dashboard-backend:latest}
    build:
      context: ./server
      dockerfile: Dockerfile
    restart: unless-stopped

  web:
    image: ${DRT_WEB_IMAGE:-drt-visualization-dashboard-web:latest}
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${HOST_WEB_PORT:-18080}:8080"
    depends_on:
      - backend
    restart: unless-stopped
